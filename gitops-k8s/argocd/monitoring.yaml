apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring
  namespace: argocd 

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.6.2
  
    helm:
      valueFiles:
        - $values/gitops-k8s/monitoring/values.yaml

    repoURL: https://github.com/sunilchouhan07/cloud-native-devops-pipeline.git 
    targetRevision: main 
    ref: values


  destination: 
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy: 
    automated: 
      prune: true 
      selfHeal: true 
    syncOptions: 
      - CreateNamespace=true
